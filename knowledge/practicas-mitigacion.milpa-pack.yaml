schema_version: "1.0"
name: practicas-mitigacion
version: 1.0.0
publisher: agromeda
license: CC-BY-SA-4.0

display_name:
  es: Practicas de mitigacion
  en: Mitigation practices

description:
  es: Recetas para reducir la huella de carbono agricola.
  en: Recipes to reduce agricultural carbon footprint.

applies_to:
  systems: ["*"]

topics:
  - id: mitigacion.no_till
    when: "default"
    risk_level: low
    answer_template: |
      No-till secuestra 0.3-0.5 t CO2e/ha/ano por 10 anos (IPCC AR6).
      Pre-condiciones: rotacion con cover crops, control de malezas, residuos en superficie.
  - id: mitigacion.cover_crops
    when: "default"
    risk_level: low
    answer_template: |
      Cover crops: 0.4-0.7 t CO2e/ha/ano. Costo $80-200 USD/ha. Recuperable via menor uso de N.
  - id: mitigacion.compost
    when: "default"
    risk_level: low
    answer_template: |
      Compost: 0.2-0.4 t CO2e/ha/ano neto. Receta C:N 25-30, humedad 50-60%, volteado 6-8 sem.
